<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Addis Clinic{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1e 0%, #0d1b3e 40%, #0a2a4a 70%, #0d3b5e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }
        /* Animated background circles */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }
        body::before {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(37,99,235,0.12) 0%, transparent 70%);
            top: -100px; right: -100px;
        }
        body::after {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(8,145,178,0.1) 0%, transparent 70%);
            bottom: -100px; left: -100px;
            animation-delay: -4s;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        .auth-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 2rem 2.2rem 1.5rem;
            width: 100%;
            max-width: 460px;
            max-height: 95vh;
            overflow-y: auto;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            animation: slideUp 0.5s cubic-bezier(0.4,0,0.2,1);
            position: relative;
            z-index: 1;
        }
        .auth-card::-webkit-scrollbar { width: 4px; }
        .auth-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .auth-logo { text-align: center; margin-bottom: 2rem; }
        .auth-logo .logo-icon {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, #2563eb, #0891b2);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: #fff;
            margin: 0 auto 1rem;
            box-shadow: 0 8px 24px rgba(37,99,235,0.4);
            animation: iconPulse 3s ease-in-out infinite;
        }
        @keyframes iconPulse {
            0%, 100% { box-shadow: 0 8px 24px rgba(37,99,235,0.4); }
            50% { box-shadow: 0 8px 32px rgba(37,99,235,0.7); }
        }
        .auth-logo h2 { color: #fff; font-weight: 800; font-size: 1.7rem; margin: 0; letter-spacing: -0.5px; }
        .auth-logo p { color: rgba(148,163,184,0.8); font-size: 0.85rem; margin: 0.3rem 0 0; }

        h4.form-title { color: #f0f9ff; font-weight: 700; font-size: 1.2rem; margin-bottom: 0.2rem; }
        p.form-sub { color: #94a3b8; font-size: 0.85rem; margin-bottom: 1.4rem; }

        .form-label { color: #bae6fd; font-weight: 500; font-size: 0.83rem; margin-bottom: 5px; display: block; }
        .form-control {
            background: rgba(255,255,255,0.07) !important;
            border: 1.5px solid rgba(125,211,252,0.25) !important;
            border-radius: 8px;
            color: #f0f9ff !important;
            padding: 0.45rem 0.8rem;
            font-size: 0.85rem;
            transition: all 0.25s ease;
        }
        .form-control::placeholder { color: rgba(186,230,253,0.35); }
        .form-control:focus {
            background: rgba(255,255,255,0.1) !important;
            border-color: #38bdf8 !important;
            box-shadow: 0 0 0 3px rgba(56,189,248,0.2) !important;
            color: #fff !important;
            outline: none;
        }
        .form-control.is-invalid { border-color: rgba(239,68,68,0.6) !important; }
        .text-danger { color: #fca5a5 !important; font-size: 0.78rem; }
        .text-muted { color: rgba(148,163,184,0.7) !important; font-size: 0.78rem; }

        .btn-auth {
            background: linear-gradient(135deg, #2563eb, #0891b2);
            border: none;
            color: #fff;
            width: 100%;
            padding: 0.75rem;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 16px rgba(37,99,235,0.35);
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(37,99,235,0.5);
            color: #fff;
        }
        .btn-auth:active { transform: translateY(0); }

        .auth-footer { text-align: center; margin-top: 1.3rem; color: #94a3b8; font-size: 0.875rem; }
        .auth-footer a { color: #38bdf8; font-weight: 600; text-decoration: none; transition: color 0.2s; }
        .auth-footer a:hover { color: #7dd3fc; }

        .alert { border-radius: 10px; font-size: 0.875rem; border: none; margin-bottom: 1rem; }
        .alert-danger  { background: rgba(220,38,38,0.2); color: #fca5a5; border: 1px solid rgba(220,38,38,0.3); }
        .alert-success { background: rgba(22,163,74,0.2); color: #86efac; border: 1px solid rgba(22,163,74,0.3); }
        .alert-warning { background: rgba(217,119,6,0.2); color: #fcd34d; border: 1px solid rgba(217,119,6,0.3); }
        .alert-info    { background: rgba(14,165,233,0.2); color: #7dd3fc; border: 1px solid rgba(14,165,233,0.3); }

        .divider { text-align: center; color: rgba(148,163,184,0.4); font-size: 0.8rem; margin: 1rem 0; position: relative; }
        .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: rgba(255,255,255,0.08); }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        small.text-muted { color: rgba(148,163,184,0.6) !important; font-size: 0.75rem; }

        /* Hide browser built-in password reveal icon */
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear,
        input[type="text"]::-ms-reveal { display: none !important; }
        input[type="password"]::-webkit-credentials-auto-fill-button { display: none !important; }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="auth-logo">
        <div class="logo-icon"><i class="fas fa-hospital-alt"></i></div>
        <h2>Addis Clinic</h2>
        <p>Clinic Appointment System</p>
    </div>
    {% for message in messages %}
    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show">
        {{ message }}
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Auto password toggle + block paste on confirm fields
document.addEventListener('DOMContentLoaded', function () {
    // Auto-dismiss all alerts after 10 seconds
    document.querySelectorAll('.alert.alert-dismissible').forEach(function (alert) {
        setTimeout(function () {
            var bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
            bsAlert.close();
        }, 10000);
    });
    document.querySelectorAll('input[type="password"]').forEach(function (input) {
        // Block paste on confirm password fields
        var name = (input.name || '').toLowerCase();
        if (name.indexOf('confirm') !== -1 || name.indexOf('password2') !== -1) {
            input.addEventListener('paste', function (e) { e.preventDefault(); });
        }

        var wrapper = document.createElement('div');
        wrapper.style.cssText = 'position:relative;';
        input.parentNode.insertBefore(wrapper, input);
        wrapper.appendChild(input);

        var btn = document.createElement('button');
        btn.type = 'button';
        btn.tabIndex = -1;
        btn.innerHTML = '<i class="fas fa-eye"></i>';
        btn.style.cssText = [
            'position:absolute', 'right:10px', 'top:50%', 'transform:translateY(-50%)',
            'background:none', 'border:none', 'cursor:pointer',
            'color:rgba(148,163,184,0.7)', 'padding:0', 'font-size:0.95rem',
            'transition:color 0.2s', 'z-index:5'
        ].join(';');
        btn.addEventListener('mouseenter', function(){ this.style.color='#38bdf8'; });
        btn.addEventListener('mouseleave', function(){ this.style.color='rgba(148,163,184,0.7)'; });
        btn.addEventListener('click', function () {
            var isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            btn.innerHTML = isHidden ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
        });
        wrapper.appendChild(btn);
        input.style.paddingRight = '2.2rem';
    });
});
</script>
</body>
</html>
